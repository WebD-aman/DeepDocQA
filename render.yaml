services:
  - type: web
    name: deepdocqa-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MAX_UPLOAD_MB
        value: 10
      - key: FRONTEND_ORIGIN
        sync: false
